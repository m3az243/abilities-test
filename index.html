<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="From platform test capabilities trial professional and fast simulates the experience of the real test with evaluation and detailed analysis.">
  <title>Test capabilities trial</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="landing">
  <div class="page-shell landing-shell">
    <header class="site-header">
      <a class="brand brand-title" href="index.html" aria-label="Return to home page">Test capabilities trial</a>
      <div class="inline-actions">
        <a class="button button-ghost button-sm" href="about.html">Who are we</a>
        <button class="icon-button theme-toggle" type="button" aria-label="Switch night mode">?</button>
      </div>
    </header>

    <main class="landing-main">
      <section class="hero-card hero-card-simple">
        <div class="hero-copy">
          <span class="eyebrow">Test capabilities trial</span>
          <h1>Test your abilities</h1>
          
        <br>
          <div class="hero-actions">
            <a class="button button-primary button-lg" href="exam.html" data-action="start-exam">Start the test</a>
            <a class="button button-secondary button-lg hidden" href="exam.html" data-action="resume-exam">Resume the test</a>
          </div>

          <div class="inline-hint">
            20 questions  25 minutes
          </div>
        </div>
      </section>

      <section class="prep-card prep-card-simple">
        <div>
          <h2>Quick information</h2>
          <p class="muted">
            You can move between questions, mark any question for review, and your progress will be saved automatically during the test.
          </p>
        </div>
        <div class="summary-grid" id="historySummary" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
